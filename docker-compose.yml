version: '3.8'

# ================================================================
# SIGAB — Docker Compose (100% On-Premise)
# HGR No.1 IMSS Tijuana
# ================================================================

services:
  # ── MySQL 8.0 ─────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: sigab-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-sigab_root_2026}
      MYSQL_DATABASE:      ${DB_NAME:-sigab}
      MYSQL_USER:          ${DB_USER:-sigab_user}
      MYSQL_PASSWORD:      ${DB_PASS:-sigab_pass_2026}
    ports:
      - "3306:3306"
    volumes:
      - sigab_mysql_data:/var/lib/mysql
      - ./database/sigab_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seed_data.sql:/docker-entrypoint-initdb.d/02_seed.sql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --event-scheduler=ON
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1",
             "-u", "${DB_USER:-sigab_user}", "-p${DB_PASS:-sigab_pass_2026}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── FastAPI Backend ────────────────────────────────────────
  backend:
    build:
      context: ./sigab-backend
      dockerfile: Dockerfile
    container_name: sigab-backend
    restart: always
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      SIGAB_DB_HOST: mysql
      SIGAB_DB_PORT: 3306
      SIGAB_DB_USER: ${DB_USER:-sigab_user}
      SIGAB_DB_PASS: ${DB_PASS:-sigab_pass_2026}
      SIGAB_DB_NAME: ${DB_NAME:-sigab}
      SIGAB_UPLOAD_DIR: /app/static/uploads
      SIGAB_JWT_SECRET: ${SIGAB_JWT_SECRET:-dev-secret-CAMBIAR-EN-PRODUCCION}
      SIGAB_PUBLIC_BASE_URL: ${SIGAB_PUBLIC_BASE_URL:-http://localhost:5173}
      SIGAB_CORS_EXTRA: ${SIGAB_CORS_EXTRA:-}
      SIGAB_OLLAMA_HOST: ${SIGAB_OLLAMA_HOST:-http://host-gateway:11434}
      SIGAB_GEMMA_MODEL: ${SIGAB_GEMMA_MODEL:-qwen-claw}
      SIGAB_VISION_MODEL: ${SIGAB_VISION_MODEL:-gemma4-claw}
      SIGAB_DISABLE_COPILOT: ${SIGAB_DISABLE_COPILOT:-0}
    extra_hosts:
      - "host-gateway:host-gateway"
    volumes:
      - sigab_uploads:/app/static/uploads
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:8000/health\",timeout=3).status==200 else 1)'"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - default
      - hostedapps_default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=hostedapps_default"
      - "traefik.http.routers.sigab-api.rule=Host(`sigab.129-121-100-147.sslip.io`) && (PathPrefix(`/api`) || PathPrefix(`/static`) || PathPrefix(`/health`) || PathPrefix(`/docs`))"
      - "traefik.http.routers.sigab-api.entrypoints=web"
      - "traefik.http.routers.sigab-api.priority=100"
      - "traefik.http.routers.sigab-api.middlewares=sigab-redirect@docker"
      - "traefik.http.routers.sigab-api.service=sigab-api-svc"
      - "traefik.http.routers.sigab-api-s.rule=Host(`sigab.129-121-100-147.sslip.io`) && (PathPrefix(`/api`) || PathPrefix(`/static`) || PathPrefix(`/health`) || PathPrefix(`/docs`))"
      - "traefik.http.routers.sigab-api-s.entrypoints=websecure"
      - "traefik.http.routers.sigab-api-s.priority=100"
      - "traefik.http.routers.sigab-api-s.service=sigab-api-svc"
      - "traefik.http.routers.sigab-api-s.tls=true"
      - "traefik.http.routers.sigab-api-s.tls.certresolver=challenger"
      - "traefik.http.services.sigab-api-svc.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.sigab-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.sigab-redirect.redirectscheme.permanent=true"

  # ── Frontend estático (nginx:alpine sirviendo build) ─────────
  frontend:
    image: nginx:alpine
    container_name: sigab-frontend
    restart: always
    volumes:
      - ./sigab-frontend/dist:/usr/share/nginx/html:ro
      - ./nginx-frontend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - hostedapps_default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=hostedapps_default"
      - "traefik.http.routers.sigab-fe.rule=Host(`129.121.100.147`) || Host(`sigab.129-121-100-147.sslip.io`)"
      - "traefik.http.routers.sigab-fe.entrypoints=web"
      - "traefik.http.routers.sigab-fe.middlewares=sigab-redirect@docker"
      - "traefik.http.routers.sigab-fe.priority=10"
      - "traefik.http.routers.sigab-fe.service=sigab-fe-svc"
      - "traefik.http.routers.sigab-fe-s.rule=Host(`sigab.129-121-100-147.sslip.io`)"
      - "traefik.http.routers.sigab-fe-s.entrypoints=websecure"
      - "traefik.http.routers.sigab-fe-s.priority=10"
      - "traefik.http.routers.sigab-fe-s.service=sigab-fe-svc"
      - "traefik.http.routers.sigab-fe-s.tls=true"
      - "traefik.http.routers.sigab-fe-s.tls.certresolver=challenger"
      - "traefik.http.services.sigab-fe-svc.loadbalancer.server.port=80"

volumes:
  sigab_mysql_data:
    name: sigab_mysql_data
  sigab_uploads:
    name: sigab_uploads

networks:
  default:
    name: sigab_default
  hostedapps_default:
    external: true
